name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - "packages/cograph/**"
      - "packages/cograph-mcp/**"
      - "packages/onta-mcp/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push version-bump commit
      id-token: write   # needed for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces

      # MOE-21 Layer 4 — inspect the actual tarballs for forbidden paths before
      # any publish. Public publication is a one-way door; this is the last gate.
      - name: Inspect bundles for OSS boundary violations
        run: bash scripts/check_npm_bundle.sh

      - name: Configure git for version bump commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump and publish cograph
        working-directory: packages/cograph
        run: |
          # Skip if this commit was itself a version bump (avoids infinite loop)
          if git log -1 --pretty=%s | grep -q "^chore(release): bump cograph"; then
            echo "Version bump commit detected — skipping cograph publish."
            exit 0
          fi
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          cd ../..
          git add packages/cograph/package.json package-lock.json
          git commit -m "chore(release): bump cograph to v${NEW_VERSION} [skip ci]"
          git push
          cd packages/cograph
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump and publish cograph-mcp
        working-directory: packages/cograph-mcp
        run: |
          if git log -1 --pretty=%s | grep -q "^chore(release): bump cograph-mcp"; then
            echo "Version bump commit detected — skipping cograph-mcp publish."
            exit 0
          fi
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          cd ../..
          git add packages/cograph-mcp/package.json package-lock.json
          git commit -m "chore(release): bump cograph-mcp to v${NEW_VERSION} [skip ci]"
          git push
          cd packages/cograph-mcp
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # onta-mcp is a thin alias of cograph-mcp (new brand, same server). Publish
      # it alongside so `npx -y onta-mcp` resolves. It depends on cograph-mcp via
      # a `^0.1.0` range, so it picks up whatever cograph-mcp version was just
      # published above.
      - name: Bump and publish onta-mcp
        working-directory: packages/onta-mcp
        run: |
          if git log -1 --pretty=%s | grep -q "^chore(release): bump onta-mcp"; then
            echo "Version bump commit detected — skipping onta-mcp publish."
            exit 0
          fi
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          cd ../..
          git add packages/onta-mcp/package.json package-lock.json
          git commit -m "chore(release): bump onta-mcp to v${NEW_VERSION} [skip ci]"
          git push
          cd packages/onta-mcp
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
