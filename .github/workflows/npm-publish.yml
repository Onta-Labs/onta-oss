name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - "packages/cograph/**"
      - "packages/cograph-mcp/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push version-bump commit
      id-token: write   # needed for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces

      # MOE-21 Layer 4 — inspect the actual tarballs for forbidden paths before
      # any publish. Public publication is a one-way door; this is the last gate.
      - name: Inspect bundles for OSS boundary violations
        run: bash scripts/check_npm_bundle.sh

      - name: Configure git for version bump commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Publish @onta/cli (the SDK + CLI) first — @onta/mcp depends on it.
      - name: Bump and publish @onta/cli
        working-directory: packages/cograph
        run: |
          # Skip if this commit was itself a version bump (avoids infinite loop)
          if git log -1 --pretty=%s | grep -q "^chore(release): bump @onta/cli"; then
            echo "Version bump commit detected — skipping @onta/cli publish."
            exit 0
          fi
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          cd ../..
          git add packages/cograph/package.json package-lock.json
          git commit -m "chore(release): bump @onta/cli to v${NEW_VERSION} [skip ci]"
          git push
          cd packages/cograph
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish @onta/mcp second — it depends on @onta/cli via a `^0.1.0` range,
      # so it picks up whatever @onta/cli version was just published above.
      - name: Bump and publish @onta/mcp
        working-directory: packages/cograph-mcp
        run: |
          if git log -1 --pretty=%s | grep -q "^chore(release): bump @onta/mcp"; then
            echo "Version bump commit detected — skipping @onta/mcp publish."
            exit 0
          fi
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          cd ../..
          git add packages/cograph-mcp/package.json package-lock.json
          git commit -m "chore(release): bump @onta/mcp to v${NEW_VERSION} [skip ci]"
          git push
          cd packages/cograph-mcp
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
